<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B4E" />
      <stop offset="100%" stop-color="#0F0F0F" />
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="50" cy="50" r="46" fill="url(#bg-grad)" stroke="#4A5568" stroke-width="2" />
  
  <!-- Outer Semi-Circle (Far) -->
  <path d="M 15 50 A 35 35 0 0 1 85 50" fill="none" stroke="url(#ring-grad)" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  
  <!-- Middle Semi-Circle (Near) -->
  <path d="M 25 50 A 25 25 0 0 1 75 50" fill="none" stroke="url(#ring-grad)" stroke-width="6" stroke-linecap="round" opacity="0.6" />
  
  <!-- Inner Semi-Circle (Close) -->
  <path d="M 40 50 A 10 10 0 0 1 60 50" fill="none" stroke="url(#ring-grad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Center Node/Token indicator -->
  <circle cx="50" cy="50" r="4" fill="#F59E0B" />
</svg>
